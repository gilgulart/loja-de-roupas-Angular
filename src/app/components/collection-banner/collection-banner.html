<section class="collection">
  <div class="image image--far-left">
    <img [src]="collection().farLeft">
  </div>

  <div class="image image--left">
    <img [src]="collection().left">
  </div>

  <div class="image image--center">
  <img [src]="collection().center">
  </div>

  <div class="image image--right">
   <img [src]="collection().right">
  </div>

  <div class="image image--far-right">
   <img [src]="collection().farRight">
  </div>
</section>
